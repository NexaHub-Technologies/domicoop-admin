<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container": "#eceef0",
              "on-tertiary-fixed-variant": "#7a2f00",
              "on-secondary-container": "#485780",
              "tertiary-container": "#9b3e00",
              "surface": "#f7f9fb",
              "outline": "#737784",
              "error": "#ba1a1a",
              "inverse-primary": "#b2c5ff",
              "primary-fixed": "#dae2ff",
              "tertiary": "#752d00",
              "surface-tint": "#2358c1",
              "on-secondary-fixed-variant": "#36466d",
              "background": "#f7f9fb",
              "surface-container-highest": "#e0e3e5",
              "primary-fixed-dim": "#b2c5ff",
              "tertiary-fixed": "#ffdbcc",
              "surface-container-low": "#f2f4f6",
              "surface-container-high": "#e6e8ea",
              "inverse-surface": "#2d3133",
              "on-error": "#ffffff",
              "error-container": "#ffdad6",
              "tertiary-fixed-dim": "#ffb694",
              "on-primary": "#ffffff",
              "on-tertiary-container": "#ffc7ae",
              "on-secondary-fixed": "#071a3f",
              "on-primary-fixed": "#001847",
              "secondary-fixed-dim": "#b6c5f5",
              "on-error-container": "#93000a",
              "secondary-fixed": "#dae2ff",
              "surface-dim": "#d8dadc",
              "on-tertiary-fixed": "#351000",
              "primary-container": "#1e55be",
              "on-primary-container": "#c5d3ff",
              "secondary": "#4e5d87",
              "on-secondary": "#ffffff",
              "on-background": "#191c1e",
              "inverse-on-surface": "#eff1f3",
              "outline-variant": "#c3c6d5",
              "on-tertiary": "#ffffff",
              "on-surface-variant": "#434653",
              "surface-bright": "#f7f9fb",
              "surface-variant": "#e0e3e5",
              "primary": "#003d9a",
              "surface-container-lowest": "#ffffff",
              "secondary-container": "#becefd",
              "on-surface": "#191c1e",
              "on-primary-fixed-variant": "#0040a0"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-cobalt-gradient {
            background: linear-gradient(135deg, #003d9a 0%, #1e55be 100%);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Bar (Shared Component Strategy) -->
<header class="bg-transparent text-[#003d9a] font-body flex justify-between items-center w-full px-8 py-6 max-w-full">
<div class="text-xl font-bold tracking-tight text-[#003d9a]">Financial Archive</div>
<div class="flex gap-6 items-center">
<button class="material-symbols-outlined text-[#191c1e] hover:text-[#1e55be] transition-colors duration-200" data-icon="help_outline">help_outline</button>
<button class="material-symbols-outlined text-[#191c1e] hover:text-[#1e55be] transition-colors duration-200" data-icon="info">info</button>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-4 py-12">
<!-- Login Container -->
<div class="w-full max-w-[440px] flex flex-col gap-8">
<!-- Logo/System Identity -->
<div class="flex flex-col items-center text-center space-y-2">
<div class="w-16 h-16 bg-surface-container-highest rounded-xl flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="account_balance">account_balance</span>
</div>
<h1 class="text-[1.5rem] font-bold tracking-tight text-on-background">DOMICOP Administration</h1>
<p class="text-on-surface-variant body-md">Secure portal for financial data management and archival oversight.</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0px_12px_32px_rgba(25,28,30,0.06)]">
<form class="space-y-6" onsubmit="return false;">
<!-- Admin ID Field -->
<div class="space-y-2">
<label class="block text-label-sm font-semibold uppercase tracking-wider text-on-surface-variant" for="admin-id">Admin ID</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="badge">badge</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200 outline-none body-md" id="admin-id" placeholder="Enter identification number" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-label-sm font-semibold uppercase tracking-wider text-on-surface-variant" for="password">Password</label>
<a class="text-primary font-semibold text-xs hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200 outline-none body-md" id="password" placeholder="••••••••" type="password"/>
<button class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant" data-icon="visibility" type="button">visibility</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary transition-colors cursor-pointer" id="remember-me" type="checkbox"/>
<label class="ml-3 body-md text-on-surface-variant cursor-pointer select-none" for="remember-me">Remember this device</label>
</div>
<!-- Sign In Button -->
<button class="w-full bg-cobalt-gradient text-white font-bold py-4 rounded-lg shadow-lg hover:opacity-90 active:scale-95 transition-all duration-200 flex items-center justify-center gap-2" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-xl" data-icon="login">login</span>
</button>
</form>
</div>
<!-- Security Notice -->
<div class="flex items-center justify-center gap-3 px-6 py-4 bg-surface-container-low rounded-lg">
<span class="material-symbols-outlined text-primary-container" data-icon="security" data-weight="fill" style="font-variation-settings: 'FILL' 1;">security</span>
<p class="text-[0.6875rem] text-on-surface-variant uppercase tracking-widest leading-relaxed">
                    End-to-End Encrypted Session
                </p>
</div>
</div>
</main>
<!-- Footer (Shared Component Strategy) -->
<footer class="bg-transparent text-[#003d9a] text-[0.6875rem] font-label uppercase tracking-wider flex flex-col md:flex-row justify-between items-center w-full px-8 py-4 fixed bottom-0 left-0">
<div class="text-slate-500">© 2024 Financial Archive System. Secure Portal.</div>
<div class="flex gap-6 mt-4 md:mt-0">
<a class="text-slate-500 hover:underline hover:text-[#003d9a]" href="#">Privacy Policy</a>
<a class="text-slate-500 hover:underline hover:text-[#003d9a]" href="#">Terms of Service</a>
<a class="text-slate-500 hover:underline hover:text-[#003d9a]" href="#">Security Whitepaper</a>
</div>
</footer>
<!-- Background Decoration (Subtle Lucid Architect elements) -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -right-[10%] w-[40%] h-[40%] bg-primary-container/5 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[30%] h-[30%] bg-tertiary/5 blur-[100px] rounded-full"></div>
</div>
</body></html>
